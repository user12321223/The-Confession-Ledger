<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIREDA | Sistem Informasi Rekap Dosa Alisha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between">

    <main class="flex-grow flex items-center justify-center w-full p-4">
        
        <!-- ================= Halaman 1: DASHBOARD MARA ================= -->
        <div id="page-dashboard" class="page w-full max-w-2xl my-4 space-y-5 active">
            <div class="flex justify-between items-center bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-sm">
                <div>
                    <h2 class="text-xs font-bold text-slate-200">Database Pelanggaran Alisha</h2>
                    <p class="text-[10px] text-slate-400 mt-0.5">Target Korban: <span class="text-rose-400 font-bold">Mara ✨</span></p>
                </div>
                <div class="bg-rose-950 border border-rose-900 text-rose-400 px-2 py-1 rounded text-[9px] font-mono animate-pulse tracking-wider font-bold">
                    STATUS: REAL-TIME DATABASE
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 text-center shadow-sm">
                    <span class="text-3xl font-black text-rose-500" id="count-total">0</span>
                    <p class="text-[9px] text-slate-400 mt-1 uppercase font-bold tracking-wider">Total Dosa Diinput</p>
                </div>
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 text-center shadow-sm">
                    <span class="text-3xl font-black text-emerald-400" id="count-maaf">0</span>
                    <p class="text-[9px] text-slate-400 mt-1 uppercase font-bold tracking-wider">Dosa Dimaafkan</p>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-wider px-1">
                    <i class="fa-solid fa-list-ul mr-1.5"></i>Daftar Pelanggaran Terakhir:
                </h3>
                
                <!-- Loading State -->
                <div id="loading-status" class="text-center py-8 text-sm text-slate-400 font-mono">
                    <i class="fa-solid fa-spinner animate-spin mr-2"></i>Menghubungkan ke Database Google Sheets...
                </div>

                <!-- Wadah Tempat Dosa dari Google Sheets Dimasukkan -->
                <div id="container-dosa" class="space-y-4"></div>
            </div>
        </div>

        <!-- ================= Halaman 2: PANEL INPUT ADMIN (ALISHA) ================= -->
        <div id="page-admin" class="page w-full max-w-md bg-slate-800 rounded-2xl p-6 border border-slate-700 shadow-xl">
            <div class="text-emerald-400 text-3xl text-center mb-2"><i class="fa-solid fa-folder-plus"></i></div>
            <h1 class="text-base font-bold text-center mb-6 uppercase tracking-wide">Input Dosa Baru Alisha</h1>
            
            <div class="space-y-4 text-xs">
                <div>
                    <label class="block text-slate-400 mb-1 font-bold">TANGGAL KEJADIAN</label>
                    <input type="text" id="form-tanggal" placeholder="Contoh: 11 Juni 2026" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-slate-400 mb-1 font-bold">TINGKAT KEPARAHAN</label>
                    <select id="form-tingkat" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 focus:outline-none focus:border-emerald-500">
                        <option value="LOW / RECEH">LOW / RECEH</option>
                        <option value="WARNING / MEDIUM">WARNING / MEDIUM</option>
                        <option value="CRITICAL ERROR">CRITICAL ERROR</option>
                    </select>
                </div>
                <div>
                    <label class="block text-slate-400 mb-1 font-bold">NAMA KASUS / JUDUL</label>
                    <input type="text" id="form-kasus" placeholder="Contoh: Miskom Gara-Gara Ketiduran" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-slate-400 mb-1 font-bold">PESAN PENGAKUAN DOSA & MAAF</label>
                    <textarea id="form-pesan" rows="4" placeholder="Tulis long text permintaan maafmu di sini..." class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 focus:outline-none focus:border-emerald-500 italic"></textarea>
                </div>
                <button onclick="simpanDosaBaru()" id="btn-submit-dosa" class="w-full bg-emerald-600 hover:bg-emerald-500 py-2.5 rounded-lg font-bold transition shadow-md mt-2 text-sm">
                    <i class="fa-solid fa-cloud-arrow-up mr-1"></i> Upload ke Database
                </button>
            </div>
        </div>

    </main>

    <footer class="text-center py-3 text-[10px] text-slate-500 border-t border-slate-800/80 bg-slate-950/40 w-full font-mono">
        SIREDA v2.0.0 - Cloud Ledger Systems
    </footer>

    <script>
        // PENTING: GANTI DENGAN URL WEB APP DEPLOYMENT BARU LU!
        const TRACKER_URL = "PASTE_LINK_WEB_APP_BARU_LU_DISINI";

        // Cek URL, kalau ada parameter ?admin=alisha maka ganti ke halaman input dosa
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('admin') === 'alisha') {
            document.getElementById('page-dashboard').classList.remove('active');
            document.getElementById('page-admin').classList.add('active');
        } else {
            // Jika Mara yang buka, jalankan render data database & silent tracker
            window.addEventListener('DOMContentLoaded', jalankanAplikasiUtama);
        }

        // Ambil data dari Google Sheets dan tampilkan secara dinamis
        async function jalankanAplikasiUtama() {
            if(!TRACKER_URL || TRACKER_URL.includes("PASTE_LINK")) return;
            
            // 1. Jalankan Silent Tracker perangkat Mara
            let userAgent = navigator.userAgent;
            let device = "Perangkat Tidak Dikenal";
            if (/android/i.test(userAgent)) device = "HP Android";
            else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) device = "iPhone/iPad";
            else if (/Macintosh/i.test(userAgent)) device = "Macbook/iMac";
            else if (/Windows/i.test(userAgent)) device = "Laptop/PC Windows";

            fetch(TRACKER_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ type: "LOG_AKSES", aksi: `MARA BUKA LINK REKAP DOSA (via ${device})` })
            });

            // 2. Tarik data dosa dari Google Sheets
            try {
                const response = await fetch(TRACKER_URL);
                const listDosa = await response.json();
                
                document.getElementById('loading-status').style.display = 'none';
                
                let totalDosa = listDosa.length;
                let totalDimaafkan = 0;
                const container = document.getElementById('container-dosa');
                container.innerHTML = "";

                listDosa.forEach(dosa => {
                    let badgeColor = "bg-blue-950 text-blue-400 border-blue-900";
                    if(dosa.tingkat.includes("WARNING")) badgeColor = "bg-amber-950 text-amber-400 border-amber-900";
                    if(dosa.tingkat.includes("CRITICAL")) badgeColor = "bg-red-950 text-red-400 border-red-900";

                    let buttonHtml = `<button onclick="maafkanDosa(this, ${dosa.id})" class="bg-emerald-600 hover:bg-emerald-500 text-white text-[11px] font-bold px-3 py-1.5 rounded-md flex items-center gap-1 transition shadow"><i class="fa-solid fa-heart"></i> Maafkan Alisha</button>`;
                    
                    if(dosa.status === "Sudah Dimaafkan") {
                        totalDimaafkan++;
                        buttonHtml = `<button class="bg-slate-700 text-slate-400 text-[11px] font-bold px-3 py-1.5 rounded-md flex items-center gap-1 cursor-not-allowed" disabled><i class="fa-solid fa-check"></i> Sudah Dimaafkan</button>`;
                    }

                    let card = `
                        <div class="bg-slate-800 rounded-xl border border-slate-700 p-4 space-y-3 shadow-sm">
                            <div class="flex justify-between items-start">
                                <span class="text-[9px] ${badgeColor} px-2 py-0.5 rounded font-bold uppercase tracking-wide border">${dosa.tingkat}</span>
                                <span class="text-[10px] text-slate-400 font-mono">${dosa.tanggal}</span>
                            </div>
                            <h4 class="text-xs font-bold text-slate-100">Kasus: ${dosa.kasus}</h4>
                            <p class="text-xs text-slate-300 leading-relaxed bg-slate-900/50 p-3 rounded-lg italic">"${dosa.pesan}"</p>
                            <div class="flex justify-end pt-1">${buttonHtml}</div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

                document.getElementById('count-total').innerText = totalDosa;
                document.getElementById('count-maaf').innerText = totalDimaafkan;

            } catch (err) {
                document.getElementById('loading-status').innerText = "Gagal memuat database dosa. Periksa link Apps Script lu.";
            }
        }

        // Fungsi ketika Mara memaafkan dosa (Simpan Permanen ke Google Sheets)
        async function maafkanDosa(btn, id) {
            btn.disabled = true;
            btn.className = "bg-slate-700 text-slate-400 text-[11px] font-bold px-3 py-1.5 rounded-md flex items-center gap-1 cursor-not-allowed";
            btn.innerHTML = `<i class="fa-solid fa-check"></i> Sudah Dimaafkan`;

            confetti({ particleCount: 80, spread: 60, origin: { y: 0.7 } });

            // Kirim perintah update status ke Google Sheets
            await fetch(TRACKER_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ type: "MAAFKAN_DOSA", id: id })
            });

            // Update counter lokal
            let currentMaaf = parseInt(document.getElementById('count-maaf').innerText);
            document.getElementById('count-maaf').innerText = currentMaaf + 1;
        }

        // Fungsi Khusus Alisha untuk menambah dosa baru dari Form Web
        async function simpanDosaBaru() {
            const tanggal = document.getElementById('form-tanggal').value.trim();
            const tingkat = document.getElementById('form-tingkat').value;
            const kasus = document.getElementById('form-kasus').value.trim();
            const pesan = document.getElementById('form-pesan').value.trim();
            const btn = document.getElementById('btn-submit-dosa');

            if(!tanggal || !kasus || !pesan) {
                alert("Woy lah bro, diisi semua dulu kolomnya! wkwk");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sedang Mengirim ke Cloud...";

            await fetch(TRACKER_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    type: "TYPE_AKSES", // Dijaga tetap sinkron
                    type: "TAMBAH_DOSA",
                    tanggal: tanggal,
                    tingkat: tingkat,
                    kasus: kasus,
                    pesan: pesan
                })
            });

            alert("Dosa sukses di-upload ke sistem! Silakan kabari Mara.");
            // Reset Form
            document.getElementById('form-tanggal').value = "";
            document.getElementById('form-kasus').value = "";
            document.getElementById('form-pesan').value = "";
            btn.disabled = false;
            btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up mr-1"></i> Upload ke Database`;
        }
    </script>
</body>
</html>
